version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: crawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "crawler"]
      interval: 5s
      timeout: 5s
      retries: 5

  crawler:
    build: .
    command: ["./crawler", "crawl", "--config", "/app/config/crawler.docker.json"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info

  api:
    build: .
    command: ["./crawler", "serve", "--config", "/app/config/server.docker.json", "--addr", "0.0.0.0:8080"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_CRAWLER_API_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
